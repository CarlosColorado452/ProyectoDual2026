
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Market — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth">

  <div class="auth-wrapper">

    <!-- Panel izquierdo — decorativo -->
    <aside class="auth-deco">
      <div class="auth-deco__inner">
        <span class="auth-deco__kanji">入</span>
        <p class="auth-deco__tagline">Motto hoshī!</p>
        <p class="auth-deco__sub">Gestión de inventario</p>
      </div>
    </aside>

    <!-- Panel derecho — formulario -->
    <main class="auth-main">
      <div class="auth-box">

        <header class="auth-header">
          <a href="index.html" class="auth-back">← Volver</a>
          <h1 class="auth-title">Iniciar sesión</h1>
          <p class="auth-subtitle">Accede a tu panel de control</p>
        </header>

        <form class="auth-form" novalidate>

          <div class="field">
            <label class="field__label" for="usuario">Usuario</label>
            <input
              class="field__input"
              type="text"
              id="usuario"
              name="usuario"
              placeholder="tu_usuario"
              autocomplete="username"
              required
            >
          </div>

          <div class="field">
            <label class="field__label" for="password">Contraseña</label>
            <input
              class="field__input"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
          </div>

          <button class="auth-submit" type="submit">Entrar</button>

        </form>

        <footer class="auth-footer">
          <p>¿No tienes cuenta? <a href="registro.html" class="auth-link">Regístrate</a></p>
        </footer>

      </div>
    </main>

  </div>

</body>
</html>
